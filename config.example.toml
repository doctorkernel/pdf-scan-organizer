[input]
root_dir = "/Volumes/NAS/Documents"
filename_pattern = "(?i)^scan[a-z]?\\d+\\.pdf$"

[output]
directory = "organized"
state_file = "state/manifest.json"
mode = "move"

[scanning]
limit = 100

[lm_studio]
enabled = true
base_url = "http://127.0.0.1:1234"
model = "google/gemma-3-12b-it"
batch_size = 5
max_input_tokens = 6000
debug = false
